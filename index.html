<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <link rel="shortcut icon" href="./logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="./logo.png" alt="Laundry Service Logo">
            <p>Laundry Service</p>
        </div>
        <nav>
            <ul>
                <li>Home</li>
                <li>Service</li>
                <li>About Us</li>
                <li>Contact us</li>
            </ul>
        </nav>
        <div class="user">
            <button>User Name</button>
        </div>  
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>
                Revitalize Your<br>
                Clothes with Expert<br>
                <span>Laundry Services!</span>
            </h1>

            <p>
                From premium dry cleaning to swift wash and fold, we
                deliver care and convenience. Schedule a pickup and
                rediscover the freshness of your clothes today!
            </p>

            <button>Book a service today!</button>
        </div>

        <div class="hero-image">
            <img src="./Side_Image.png" alt="Laundry Machine">
        </div>
    </section>
</body>
</html>
